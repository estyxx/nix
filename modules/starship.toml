palette = "ester"

# Large repos (e.g. kraken-core): avoid slow directory scans; warnings hidden via STARSHIP_LOG=error.
scan_timeout = 10000
command_timeout = 10000

format = """\
[ َ°€µ ](bg:mint fg:#090c0c)\
[î‚°](fg:mint bg:blue)\
$directory\
[î‚°](fg:blue bg:pink)\
${custom.kraken_client}\
[î‚°](fg:pink bg:peach)\
$python\
[î‚°](fg:peach bg:yellow)\
$git_branch\
$git_status\
$git_metrics\
[î‚°](fg:yellow bg:ink)\
$character\
"""

right_format = """
$cmd_duration\
$time"""


[palettes.ester]
mint        = "#7DF9AA"
blue        = "#3B76F0"
peach       = "#fab387"
yellow      = "#FCF392"
navy        = "#1C3A5E"
dark        = "#030B16"
ink         = "#090c0c"
base        = "#1e1e2e"
lavender    = "#cba6f7"
aqua        = "#8DFBD2"
red         = "#E84D44"
text_light  = "#E4E4E4"
pink        = "#C82C84"



[directory]
format = "[ َ°‌° ($style)$path ]($style)"
style = "fg:text_light bg:blue"

truncate_to_repo = false
truncation_length = 3
truncation_symbol = "â€¦/"


[directory.substitutions]
"Documents" = " َ°ˆ™ "
"Downloads" = " ï€™ "
"Music"     = " َ°‌ڑ "
"Pictures"  = " ï€¾ "
"Desktop"   = " َ°ں، "
"Videos" = "ï€½ "
".config" = "ïگ£"
"~/Projects/kraken-core" = "ًںگ™"


[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "ïگک "
style = "fg:ink bg:yellow"

[git_status]
format = '[$all_status]($style)'
style = "fg:ink bg:yellow"
conflicted = "âڑ $count "
ahead = "â‡،$count "
behind = "â‡£$count "
diverged = "â‡•$count "
untracked = "?$count "
stashed = ""
modified = "~$count "
staged = "+$count "
deleted = "âœ–$count "
