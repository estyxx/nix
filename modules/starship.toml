[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "fg:ink bg:yellow"
deleted_style = "fg:bright-red bg:235"
disabled = false

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "ïگک "


[character]
success_symbol = '[îƒ—î‚°](green) '
error_symbol = '[îƒ—î‚°](red) '

[cmd_duration]
format = "[î‚²](fg:lavender bg:ink)[ ï‰‘ $duration ](fg:ink bg:lavender)[î‚²](fg:navy bg:lavender)"
show_notifications = true
min_time_to_notify = 45000

[time]
disabled = false
time_format = "%R"
format = "[](fg:navy bg:ink)[ َ±‘چ $time ](fg:aqua bg:navy)"
style = "bg:navy"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )($virtualenv) ]($style)'
symbol = " َ°Œ "
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]
style = "fg:ink bg:peach"
disabled = false

[custom.kraken_client]
description = "Display the current Kraken client"
command = "echo \"$KRAKEN_CLIENT\" "
when = "true"
format = "[ ïچچ $output ]($style)"
style = "fg:ink bg:pink"
ignore_timeout = true
