# AeroSpace Configuration

# Basic settings
start-at-login = true
automatically-unhide-macos-hidden-apps = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Gaps between windows
gaps.inner.horizontal = 0
gaps.inner.vertical = 0
gaps.outer.left = 0
gaps.outer.bottom = 0
gaps.outer.top = 0
gaps.outer.right = 0

# Define workspaces with meaningful names
[workspace-to-monitor-force-assignment]
1 = 'main'  # Browser
2 = 'main'  # Code
3 = 'main'  # Dev Tools
4 = 'main'  # Distractions

# Key bindings
[mode.main.binding]
# Workspace navigation
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-minus = 'workspace 3'
ctrl-equal = 'workspace 4'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'

# Window management
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# Layout management
cmd-shift-space = 'layout floating tiling'
alt-comma = 'layout accordion horizontal vertical'
alt-shift-comma = 'layout tiles horizontal vertical'  # Toggle side-by-side / stacked

# ==========================================
# WORKSPACE 1: BROWSER
# ==========================================
[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'  # Arc Browser
run = 'move-node-to-workspace 1'

